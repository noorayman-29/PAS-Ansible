---
- hosts: all
  gather_facts: false

  # The variables you would most likely want/need to override have been included
  vars:

    # Join
    join_server: 192.168.0.122
    join_state: unjoined
    join_password: Admin123
    join_extra_args: ''

    # Facts
    join_facts_generate: true
    join_facts_verbose: false

    # Reports
    join_reports_generate: true
    join_reports_backup: true
    join_reports_host: 192.168.0.123
    join_reports:
    - src:  join_report.csv.j2
      dest: /home/reports/pas_join_report.csv
    - src:  join_report.html.j2
      dest: /home/reports/pas_join_report.html

  roles:
    - name: oneidentity.privilege_manager.join
