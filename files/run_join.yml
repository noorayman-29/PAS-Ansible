---
- hosts: all
  gather_facts: false

  # The variables you would most likely want/need to override have been included
  vars:

    # Join
    join_server: 192.168.0.136
    join_state: joined
    join_password: Admin123
    join_extra_args: ''

    # Facts
    join_facts_generate: true
    join_facts_verbose: false

    # Reports
    join_reports_generate: true
    join_reports_backup: true
    software_reports_generate: true
    software_reports_backup: true
    software_reports_details_format: json
    software_reports_host: "192.168.0.138"

    software_reports:
      - src: software_report.csv.j2
        dest: /tmp/software_report.csv
      - src: software_report.html.j2
        dest: /tmp/software_report.html

  roles:
    - name: oneidentity.privilege_manager.join
